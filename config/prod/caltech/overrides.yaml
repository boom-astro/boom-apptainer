        Mstar_unc: 1
    - catalog: 2MASS_PSC
      radius: 2.0
      use_distance: false
      projection:
        _id: 1
        ra: 1
        dec: 1
        j_m: 1
        j_msigcom: 1
        j_snr: 1
        h_m: 1
        h_msigcom: 1
        h_snr: 1
        k_m: 1
        k_msigcom: 1
        k_snr: 1
        ndet: 1
    - catalog: GALEX
      radius: 2.0
      use_distance: false
      projection:
        _id: 1
        ra: 1
        dec: 1
        fuv_mag: 1
        fuv_magerr: 1
        nuv_mag: 1
        nuv_magerr: 1
        fuv_exp: 1
        nuv_exp: 1
        obstype: 1
        band: 1
    - catalog: VSX
      radius: 2.0
      use_distance: false
      projection:
        _id: 1
        name: 1
        var_flag: 1
        ra: 1
        dec: 1
        types: 1
        max: 1
        max_band: 1
        min_is_amplitude: 1
        min: 1
        min_band: 1
        epoch: 1
        period: 1
        spectral_type: 1
    - catalog: CatWISE2020
      radius: 2.0
      use_distance: false
      projection:
        _id: 1
        source_name: 1
        ra: 1
        dec: 1
        sigra: 1
        sigdec: 1
        w1mpro: 1
        w2mpro: 1
        w1sigmpro: 1
        w2sigmpro: 1
        w1rchi2: 1
        w2rchi2: 1
        pmra: 1
        pmdec: 1
