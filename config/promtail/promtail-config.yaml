server:
  http_listen_port: 9080
  grpc_listen_port: 0

# Persisted via the `promtail_positions` named volume so restarts don't
# re-ship logs. Without this, the file lives in the container's writable
# layer and is wiped whenever the container is recreated.
positions:
  filename: /positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Tail all Docker container logs. Uses Docker SD against the read-only
  # docker-socket-proxy (no direct daemon access required). We deliberately
  # do NOT extract trace_id into a Loki label — trace_id is high cardinality
  # and would explode the index. Instead it stays in the log line so the
  # Loki datasource's derived field can match it and link to Tempo.
  - job_name: docker
    docker_sd_configs:
      - host: tcp://docker-socket-proxy:2375
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: "project"
      - target_label: "host"
        replacement: "boom"
