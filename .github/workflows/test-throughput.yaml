name: Throughput test

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  TOLERANCE_PERCENTAGE: 5.0 # 5% tolerance for wall time increase
  # If true, data required to bootstrap MongoDB and the Kafka producer
  # are deleted before we start processing to save storage space.
  # This is useful for CI environments where storage is limited.
  LOW_STORAGE: true
  # GPU is never available on CI runners; always run CPU-only.
  BOOM_GPU__ENABLED: 'false'

jobs:
  test:
    name: Run throughput test
    runs-on: ubuntu-latest
    permissions: write-all
    timeout-minutes: 30
    strategy:
      matrix:
        cutouts_storage_type: [mongo, s3]
    env:
      CUTOUTS_STORAGE_TYPE: ${{ matrix.cutouts_storage_type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          clean: false
          lfs: "true"
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & Cache Docker images
        uses: docker/bake-action@v2
        with:
          workdir: ./tests/throughput
          load: true
          set: |
            *.cache-to=type=gha,mode=max
            *.cache-from=type=gha
        env:
          PWD: ${{ github.workspace }}
          BOOM_REPO_ROOT: ${{ github.workspace }}
          BUILDX_BAKE_ENTITLEMENTS_FS: 0
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
      - name: Download NED catalog from Google Drive
        run: |
          mkdir -p ./data/alerts
          uvx gdown https://drive.google.com/uc?id=1BG46oLMbONXhIqiPrepSnhKim1xfiVbB -O ./data/alerts/kowalski.NED.json.gz
      - name: Download auxiliary ZTF alerts from Caltech Box
        run: wget -q https://caltech.box.com/shared/static/qdois5qq2lmvp02ri50fum80vzr54505.gz -O ./data/alerts/boom_throughput.ZTF_alerts_aux.dump.gz
      - name: Run test
        run: |
          uv run tests/throughput/run.py \
            --timeout 600 \
            --n-alert-workers=6 \
            --n-enrichment-workers=5 \
            --n-filter-workers=2 \
            --cutouts-storage-type ${{ matrix.cutouts_storage_type }}
      - name: Upload logs (including wall time) as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: throughput-logs-${{ matrix.cutouts_storage_type }}
          path: logs/boom-*

  aggregate:
    name: Aggregate and report throughput results
    runs-on: ubuntu-latest
    permissions: write-all
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Download Mongo logs
        uses: actions/download-artifact@v4
        with:
          name: throughput-logs-mongo
          path: ./mongo/current
      - name: Download S3 logs
        uses: actions/download-artifact@v4
        with:
          name: throughput-logs-s3
          path: ./s3/current
      - name: Download Mongo baseline logs
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: test-throughput.yaml
          branch: main
          name: throughput-logs-mongo
          path: ./mongo/baseline
          if_no_artifact_found: warn
        continue-on-error: true
      - name: Download S3 baseline logs
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: test-throughput.yaml
          branch: main
          name: throughput-logs-s3
          path: ./s3/baseline
          if_no_artifact_found: warn
        continue-on-error: true
      - name: Aggregate and compare results
        id: aggregate
        run: |
          #!/usr/bin/env bash
          set -euo pipefail
          make_row() {
            local type=$1
            local current_file=$2
            local baseline_file=$3
            local current baseline percentage_diff
            if [ -f "$current_file" ]; then
              current=$(cat "$current_file")
            else
              current="N/A"
            fi
            if [ -f "$baseline_file" ]; then
              baseline=$(cat "$baseline_file")
              percentage_diff=$(echo "scale=2; (($current - $baseline) / $baseline) * 100" | bc)
            else
              baseline="N/A"
              percentage_diff="N/A"
            fi
            echo "| $type | $current | $baseline | $percentage_diff% |"
            # Export for fail check
            echo "$type:$percentage_diff" >> results.txt
          }

          echo "| Storage | New wall time | Baseline wall time | Difference |" > table.md
          echo "| ------- | ------------- | ------------------ | ---------- |" >> table.md
          make_row "mongo" ./mongo/current/boom-*/wall_time.txt ./mongo/baseline/boom-*/wall_time.txt >> table.md
          make_row "s3" ./s3/current/boom-*/wall_time.txt ./s3/baseline/boom-*/wall_time.txt >> table.md

          echo "table<<EOF" >> $GITHUB_OUTPUT
          cat table.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          cat results.txt || true
      - name: Post combined PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            Throughput results (`${{ github.sha }}`):
            ${{ steps.aggregate.outputs.table }}
          edit-mode: replace
      - name: Fail if wall time increased too much (PR only)
        run: |
          TOL=${{ env.TOLERANCE_PERCENTAGE }}
          while IFS=: read -r type diff; do
            if [[ "$diff" != "N/A" && $(echo "$diff > $TOL" | bc -l) -eq 1 ]]; then
              echo "$type wall time increased by $diff%, which is more than the allowed $TOL%."
              exit 1
            fi
          done < results.txt
