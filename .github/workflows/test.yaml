name: Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions: write-all
    timeout-minutes: 30
    strategy:
      matrix:
        cutouts_storage_type: [mongo, s3]
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: true
        clean: false
        lfs: 'true'
    - name: Setup System Dependencies
      run: sudo apt-get install -y libsasl2-dev
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Configure cache
      uses: Swatinem/rust-cache@v2
    - name: Create default .env file & enable Babamul
      run: |
        cp .env.example .env
        sed -i 's/BOOM_BABAMUL__ENABLED=false/BOOM_BABAMUL__ENABLED=true/' .env
    - name: Install ONNX Runtime (CPU) for tests
      run: |
        # ort 2.0.0-rc.12 with load-dynamic will download libonnxruntime.so at
        # runtime if ORT_DYLIB_PATH is not set, which can take ~20 minutes.
        # Install the CPU onnxruntime wheel and point ort at it to avoid the download.
        pip install onnxruntime==1.24.4
        ORT_CAPI=$(python3 -c "import pathlib, onnxruntime; print((pathlib.Path(onnxruntime.__file__).parent / 'capi').as_posix())")
        ORT_LIB=$(ls "${ORT_CAPI}"/libonnxruntime.so.* 2>/dev/null | head -1)
        if [ -z "${ORT_LIB}" ]; then
          ORT_LIB="${ORT_CAPI}/libonnxruntime.so"
        fi
        echo "ORT_DYLIB_PATH=${ORT_LIB}" >> "$GITHUB_ENV"
        echo "BOOM_GPU__ENABLED=false" >> "$GITHUB_ENV"
        echo "Installed ONNX Runtime at: ${ORT_LIB}"
    - name: Install Kafka CLI tools
      run: |
        KAFKA_VERSION=4.1.1
        SCALA_VERSION=2.13
        sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            libsasl2-2 ca-certificates openjdk-25-jre-headless curl bash tar
        sudo curl -fsSL https://dlcdn.apache.org/kafka/${KAFKA_VERSION}/kafka_${SCALA_VERSION}-${KAFKA_VERSION}.tgz -o /tmp/kafka.tgz
        sudo tar -xzf /tmp/kafka.tgz -C /opt
        sudo ln -s /opt/kafka_${SCALA_VERSION}-${KAFKA_VERSION} /opt/kafka
        sudo rm -f /tmp/kafka.tgz
    - name: Start services
      run: |
        if [ "${{ matrix.cutouts_storage_type }}" = "s3" ]; then
          docker compose -f docker-compose.yaml -f docker-compose.override.yaml -f docker-compose.cutouts-s3.yaml up --build -d
        else
          docker compose -f docker-compose.yaml -f docker-compose.override.yaml up --build -d
        fi
    - name: Wait for MongoDB to be ready
      run: |
        echo "Waiting for MongoDB to be ready..."
        for i in {1..60}; do
          if docker compose exec -T mongo mongosh localhost:27017/test --quiet --eval "db.runCommand('ping').ok" >/dev/null 2>&1; then
            echo "MongoDB is ready!"
            break
          fi
          echo "Attempt $i/60 - MongoDB not ready yet, waiting..."
          sleep 2
        done
        # Final check to confirm MongoDB is ready
        if ! docker compose exec -T mongo mongosh localhost:27017/test --quiet --eval "db.runCommand('ping').ok" >/dev/null 2>&1; then
          echo "MongoDB failed to start within timeout" >&2
          docker compose logs mongo || true
          exit 1
        fi
        docker compose exec -T mongo mongosh localhost:27017/boom_test --quiet --username mongoadmin --password mongoadminsecret --authenticationDatabase admin --eval "db.createCollection('LSPSC'); db.LSPSC.createIndex({'coordinates.radec_geojson': '2dsphere'});"
    - name: Wait for Kafka ACL initialization
      run: |
        echo "Waiting for kafka-acl-init to complete..."
        # The container depends_on broker:service_healthy (start_period=60s),
        # so it may take 70-90s before the container is even created.
        # Poll for up to 180s for the container to appear and exit.
        for i in $(seq 1 60); do
          CID=$(docker compose ps -a -q kafka-acl-init 2>/dev/null || true)
          if [ -n "$CID" ]; then
            STATUS=$(docker inspect -f '{{.State.Status}}' "$CID" 2>/dev/null || echo "unknown")
            if [ "$STATUS" = "exited" ]; then
              EXIT_CODE=$(docker inspect -f '{{.State.ExitCode}}' "$CID")
              echo "kafka-acl-init exited with code $EXIT_CODE"
              if [ "$EXIT_CODE" != "0" ]; then
                echo "--- kafka-acl-init logs: ---"
                docker compose logs kafka-acl-init || true
                echo "--- broker logs: ---"
                docker compose logs broker || true
                exit 1
              fi
              echo "kafka-acl-init completed successfully."
              exit 0
            fi
            echo "Attempt $i/60 - kafka-acl-init status: $STATUS"
          else
            echo "Attempt $i/60 - kafka-acl-init container not yet created"
          fi
          sleep 3
        done
        echo "Timed out waiting for kafka-acl-init (180s)" >&2
        docker compose logs kafka-acl-init || true
        docker compose logs broker || true
        exit 1
    - name: Test BOOM
      run: PATH=/opt/kafka/bin:$PATH cargo test --release
