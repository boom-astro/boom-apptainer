volumes:
  mongodb:
  valkey:
  kafka_data:
  prometheus_data:
  grafana_data:

networks:
  boom:
  traefik-public:
    # Allow setting it to false for testing and local development
    external: true

services:
  # Autoheal will monitor containers with autoheal=true label
  # and restart any that are unhealthy or exit with a non-zero status
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - boom
  mongo:
    image: mongo:8.0
    hostname: mongo
    expose:
      - "27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${BOOM_DATABASE__USERNAME:-mongoadmin}
      - MONGO_INITDB_ROOT_PASSWORD=${BOOM_DATABASE__PASSWORD:?BOOM_DATABASE__PASSWORD must be set and non-empty}
    volumes:
      - mongodb:/data/db
    restart: always
    networks:
      - boom
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      start_period: 20s
  mongodb-exporter:
    image: percona/mongodb_exporter:0.44.0
    hostname: mongodb-exporter
    depends_on:
      mongo:
        condition: service_healthy
    command:
      - --mongodb.uri=mongodb://${BOOM_DATABASE__USERNAME:-mongoadmin}:${BOOM_DATABASE__PASSWORD}@mongo:27017/admin?authSource=admin
      - --collector.dbstats
      - --web.listen-address=:9216
    networks:
      - boom
    restart: always
  valkey:
    image: valkey/valkey:7.2.6
    environment:
      # ALLOW_EMPTY_PASSWORD is recommended only for development.
      - ALLOW_EMPTY_PASSWORD=yes
      - VALKEY_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    volumes:
      - valkey:/data
    restart: always
    networks:
      - boom
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
  valkey-exporter:
    image: oliver006/redis_exporter:v1.67.0
    hostname: valkey-exporter
    depends_on:
      valkey:
        condition: service_healthy
    command:
      - --redis.addr=redis://valkey:6379
      - --check-keys=*_queue*
    networks:
      - boom
    restart: always
  broker:
    image: apache/kafka:4.1.1
    hostname: broker
    networks:
      - boom
      - traefik-public
    restart: always
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,EXTERNAL:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-15}
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-512
      KAFKA_LISTENER_NAME_EXTERNAL_SASL_ENABLED_MECHANISMS: SCRAM-SHA-512
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: 'true'
      # Include ANONYMOUS because inter-broker + controller channels use PLAINTEXT (no SASL),
      # so the principal resolves to User:ANONYMOUS. Without granting it super-user rights,
      # controller metadata or internal admin ops can be unauthorized and cause the process to exit.
      # (Alternative: secure internal listener with SASL and drop ANONYMOUS.)
      KAFKA_SUPER_USERS: "User:admin;User:ANONYMOUS"
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf -Djava.security.egd=file:/dev/./urandom"
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./config/kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf:ro
    healthcheck:
      # Match wait_for_kafka checks: cluster-id, metadata quorum, configs API, and ACLs
      test: ["CMD-SHELL", "set -euo pipefail; \
        timeout 5s /opt/kafka/bin/kafka-cluster.sh cluster-id --bootstrap-server broker:29092 >/dev/null 2>&1 && \
        timeout 5s /opt/kafka/bin/kafka-metadata-quorum.sh --bootstrap-server broker:29092 describe --status >/dev/null 2>&1 && \
        timeout 5s /opt/kafka/bin/kafka-configs.sh --bootstrap-server broker:29092 --entity-type users --describe >/dev/null 2>&1 && \
        timeout 5s /opt/kafka/bin/kafka-acls.sh --bootstrap-server broker:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 30s
      retries: 15
      start_period: 60s
    labels:
      - autoheal=true
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.tcp.services.${STACK_NAME?Variable not set}-kafka.loadbalancer.server.port=9093
      - traefik.tcp.routers.${STACK_NAME?Variable not set}-kafka.rule=HostSNI(`*`)
      - traefik.tcp.routers.${STACK_NAME?Variable not set}-kafka.entrypoints=kafka
      # Uncomment to enable TLS passthrough (requires EXTERNAL listener to use SSL)
      # - traefik.tcp.routers.${STACK_NAME?Variable not set}-kafka.tls.passthrough=true
  kafka-acl-init:
    image: apache/kafka:4.1.1
    hostname: kafka-acl-init
    depends_on:
      broker:
        condition: service_healthy
    networks:
      - boom
    environment:
      KAFKA_ADMIN_PASSWORD: ${KAFKA_ADMIN_PASSWORD:?Set KAFKA_ADMIN_PASSWORD}
      KAFKA_READONLY_PASSWORD: ${KAFKA_READONLY_PASSWORD:?Set KAFKA_READONLY_PASSWORD}
    volumes:
      - ./scripts/init_kafka_acls.sh:/init_kafka_acls.sh:ro
    entrypoint: ["bash","/init_kafka_acls.sh"]
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    hostname: kafka-exporter
    depends_on:
      broker:
        condition: service_healthy
    networks:
      - boom
    command:
      - --kafka.server=broker:29092
    restart: always
  api:
    image: boom-astro/boom:latest
    hostname: api
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - /app/boom-api
    environment:
      # Required secrets - must be set in environment
      BOOM_DATABASE__PASSWORD: ${BOOM_DATABASE__PASSWORD:?BOOM_DATABASE__PASSWORD must be set}
      BOOM_API__AUTH__SECRET_KEY: ${BOOM_API__AUTH__SECRET_KEY:?BOOM_API__AUTH__SECRET_KEY must be set}
      BOOM_API__AUTH__ADMIN_PASSWORD: ${BOOM_API__AUTH__ADMIN_PASSWORD:?BOOM_API__AUTH__ADMIN_PASSWORD must be set}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      # Optional overrides (these have defaults in config.yaml)
      BOOM_API__PORT: ${BOOM_API__PORT:-4000}
      BOOM_DATABASE__HOST: mongo
      BOOM_DATABASE__USERNAME: ${BOOM_DATABASE__USERNAME:-mongoadmin}
      BOOM_BABAMUL__ENABLED: ${BOOM_BABAMUL__ENABLED:-false}
      # SMTP config for email notifications
      SMTP_SERVER: ${SMTP_SERVER:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
    networks:
      - boom
      - traefik-public
    volumes:
      - ${PWD}/config.yaml:/app/config.yaml
    profiles:
      - prod
      - dev
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME?Variable not set}-api.loadbalancer.server.port=4000
      - traefik.http.routers.${STACK_NAME?Variable not set}-api-http.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-api-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-api-https.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-api-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-api-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-api-https.tls.certresolver=le
      # Define Traefik Middleware to handle domain with and without "www" to redirect to only one
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-www-redirect.redirectregex.regex=^http(s)?://www.(${DOMAIN?Variable not set})/(.*)
      # Redirect a domain with www to non-www
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-www-redirect.redirectregex.replacement=http$${1}://${DOMAIN?Variable not set}/$${3}
      # Compression middleware
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-api-compress.compress=true
      # Rate limiting middleware
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-api-ratelimit.ratelimit.average=${BOOM_API_RATE_LIMIT_AVERAGE:-50}
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-api-ratelimit.ratelimit.burst=${BOOM_API_RATE_LIMIT_BURST:-200}
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-api-ratelimit.ratelimit.period=${BOOM_API_RATE_LIMIT_PERIOD:-1s}
      # Enable www redirection for HTTP and HTTPS
      - traefik.http.routers.${STACK_NAME?Variable not set}-api-http.middlewares=https-redirect,${STACK_NAME?Variable not set}-www-redirect,${STACK_NAME?Variable not set}-api-ratelimit,${STACK_NAME?Variable not set}-api-compress
      - traefik.http.routers.${STACK_NAME?Variable not set}-api-https.middlewares=${STACK_NAME?Variable not set}-www-redirect,${STACK_NAME?Variable not set}-api-ratelimit,${STACK_NAME?Variable not set}-api-compress
  consumer-ztf:
    image: boom-astro/boom:latest
    hostname: consumer-ztf
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Required secrets - must be set in environment
      BOOM_DATABASE__PASSWORD: ${BOOM_DATABASE__PASSWORD:?BOOM_DATABASE__PASSWORD must be set}
      BOOM_KAFKA__CONSUMER__ZTF__GROUP_ID: ${BOOM_KAFKA__CONSUMER__ZTF__GROUP_ID:?BOOM_KAFKA__CONSUMER__ZTF__GROUP_ID must be set}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      # Optional overrides
      BOOM_DATABASE__HOST: mongo
      BOOM_DATABASE__USERNAME: ${BOOM_DATABASE__USERNAME:-mongoadmin}
      BOOM_REDIS__HOST: valkey
    networks:
      - boom
    profiles:
      - prod
    volumes:
      - ${PWD}/config.yaml:/app/config.yaml
    command:
      - /app/kafka_consumer
      - ztf
  consumer-lsst:
    image: boom-astro/boom:latest
    hostname: consumer-lsst
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Required secrets - must be set in environment
      BOOM_DATABASE__PASSWORD: ${BOOM_DATABASE__PASSWORD:?BOOM_DATABASE__PASSWORD must be set}
      BOOM_KAFKA__CONSUMER__LSST__GROUP_ID: ${BOOM_KAFKA__CONSUMER__LSST__GROUP_ID:?BOOM_KAFKA__CONSUMER__LSST__GROUP_ID must be set}
      BOOM_KAFKA__CONSUMER__LSST__USERNAME: ${BOOM_KAFKA__CONSUMER__LSST__USERNAME:?BOOM_KAFKA__CONSUMER__LSST__USERNAME must be set}
      BOOM_KAFKA__CONSUMER__LSST__PASSWORD: ${BOOM_KAFKA__CONSUMER__LSST__PASSWORD:?BOOM_KAFKA__CONSUMER__LSST__PASSWORD must be set}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      # Optional overrides
      BOOM_DATABASE__HOST: mongo
      BOOM_DATABASE__USERNAME: ${BOOM_DATABASE__USERNAME:-mongoadmin}
      BOOM_REDIS__HOST: valkey
    networks:
      - boom
    profiles:
      - prod
    volumes:
      - ${PWD}/config.yaml:/app/config.yaml
    command:
      - /app/kafka_consumer
      - lsst
  scheduler-ztf:
    image: boom-astro/boom:latest
    hostname: scheduler-ztf
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Required secrets - must be set in environment
      BOOM_DATABASE__PASSWORD: ${BOOM_DATABASE__PASSWORD:?BOOM_DATABASE__PASSWORD must be set}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      # Optional overrides
      BOOM_DATABASE__HOST: mongo
      BOOM_DATABASE__USERNAME: ${BOOM_DATABASE__USERNAME:-mongoadmin}
      BOOM_BABAMUL__ENABLED: ${BOOM_BABAMUL__ENABLED:-false}
      BOOM_REDIS__HOST: valkey
      BOOM_GPU__ENABLED: ${BOOM_GPU__ENABLED:-false}
      BOOM_GPU__DEVICE_IDS: ${BOOM_GPU__DEVICE_IDS:-0}
    networks:
      - boom
    profiles:
      - prod
    volumes:
      - ${PWD}/config.yaml:/app/config.yaml
      - ${PWD}/data/models:/app/data/models:ro
      - ${PWD}/data/ls_footprint_moc.fits:/app/data/ls_footprint_moc.fits:ro
    command:
      - /app/scheduler
      - ztf
  scheduler-lsst:
    image: boom-astro/boom:latest
    hostname: scheduler-lsst
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Required secrets - must be set in environment
      BOOM_DATABASE__PASSWORD: ${BOOM_DATABASE__PASSWORD:?BOOM_DATABASE__PASSWORD must be set}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      # Optional overrides
      BOOM_DATABASE__HOST: mongo
      BOOM_DATABASE__USERNAME: ${BOOM_DATABASE__USERNAME:-mongoadmin}
      BOOM_BABAMUL__ENABLED: ${BOOM_BABAMUL__ENABLED:-false}
      BOOM_REDIS__HOST: valkey
      BOOM_GPU__ENABLED: ${BOOM_GPU__ENABLED:-false}
      BOOM_GPU__DEVICE_IDS: ${BOOM_GPU__DEVICE_IDS:-0}
    networks:
      - boom
    profiles:
      - prod
    volumes:
      - ${PWD}/config.yaml:/app/config.yaml
      - ${PWD}/data/models:/app/data/models:ro
      - ${PWD}/data/ls_footprint_moc.fits:/app/data/ls_footprint_moc.fits:ro
    command:
      - /app/scheduler
      - lsst
  otel-collector: # [^1]
    image: otel/opentelemetry-collector:0.131.1
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otelcol/config.yaml
    networks:
      - boom
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    hostname: docker-socket-proxy
    environment:
      CONTAINERS: 1
      EVENTS: 0
      PING: 1
      VERSION: 1
      POST: 0
      TIMEOUT_CLIENT: 30s
      TIMEOUT_CONNECT: 5s
      TIMEOUT_SERVER: 30s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/docker-socket-proxy/haproxy.cfg.template:/usr/local/etc/haproxy/haproxy.cfg.template:ro
    tmpfs:
      - /var/lib/haproxy
    networks:
      - boom
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: always
  cadvisor:
    image: ghcr.io/google/cadvisor:0.56.2
    hostname: cadvisor
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
    networks:
      - boom
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: always
  docker-metadata-exporter:
    image: python:3.12-alpine
    hostname: docker-metadata-exporter
    command:
      - python
      - /scripts/docker_metadata_exporter.py
    environment:
      DOCKER_API_BASE: http://docker-socket-proxy:2375
    volumes:
      - ./scripts/docker_metadata_exporter.py:/scripts/docker_metadata_exporter.py:ro
    networks:
      - boom
    depends_on:
      - docker-socket-proxy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: always
  prometheus:
    image: prom/prometheus:latest
    command:
      - --web.enable-otlp-receiver # [^2]
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yaml
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      - boom
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME?Variable not set}-prometheus.loadbalancer.server.port=9090
      - traefik.http.routers.${STACK_NAME?Variable not set}-prometheus-http.rule=Host(`prometheus.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-prometheus-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-prometheus-https.rule=Host(`prometheus.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-prometheus-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-prometheus-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-prometheus-https.tls.certresolver=le
      # HTTPS redirect middleware
      - traefik.http.routers.${STACK_NAME?Variable not set}-prometheus-http.middlewares=https-redirect
      # Basic auth middleware
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-prometheus-auth.basicauth.users=${PROMETHEUS_USER:?PROMETHEUS_USER must be set}:${PROMETHEUS_HASHED_PASSWORD:?PROMETHEUS_HASHED_PASSWORD must be set}
      - traefik.http.routers.${STACK_NAME?Variable not set}-prometheus-https.middlewares=${STACK_NAME?Variable not set}-prometheus-auth
    restart: always
  grafana:
    image: grafana/grafana:11.5.2
    entrypoint:
      - bash
      - /scripts/grafana-dashboard-provisioning.sh
    command:
      - /run.sh
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_AUTH_ANONYMOUS_ENABLED: false
      # Dashboards are read-only by default in production; set to true in docker-compose.override.yaml for dev
      GRAFANA_DASHBOARD_EDITABLE: false
    volumes:
      - grafana_data:/var/lib/grafana
      # Keep provisioning read-only in the container; the entrypoint script
      # skips rewriting dashboards.yaml when this mount is not writable.
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./scripts/grafana-dashboard-provisioning.sh:/scripts/grafana-dashboard-provisioning.sh:ro
    expose:
      - "3000"
    networks:
      - boom
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME?Variable not set}-grafana.loadbalancer.server.port=3000
      - traefik.http.routers.${STACK_NAME?Variable not set}-grafana-http.rule=Host(`grafana.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-grafana-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-grafana-https.rule=Host(`grafana.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-grafana-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-grafana-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-grafana-https.tls.certresolver=le
      - traefik.http.routers.${STACK_NAME?Variable not set}-grafana-http.middlewares=https-redirect
    restart: always

# [^1]:
#   * https://opentelemetry.io/docs/collector/quick-start/
#   * https://opentelemetry.io/docs/collector/installation/#docker-compose

# [^2]: https://prometheus.io/docs/guides/opentelemetry/#enable-the-otlp-receiver
