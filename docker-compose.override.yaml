# Overrides for local development

services:
  proxy:
    image: traefik:v3.6.2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "80:80"
      - "8090:8080"
    # Duplicate the command from docker-compose.yml to add --api.insecure=true
    command:
      # Enable Docker in Traefik, so that it reads labels from Docker services
      - --providers.docker
      # Add a constraint to only use services with the label for this stack
      - --providers.docker.constraints=Label(`traefik.constraint-label`, `traefik-public`)
      # Do not expose all Docker services, only the ones explicitly exposed
      - --providers.docker.exposedbydefault=false
      # Create an entrypoint "http" listening on port 80
      - --entrypoints.http.address=:80
      # Create an entrypoint "https" listening on port 443
      - --entrypoints.https.address=:443
      # Enable the access log, with HTTP requests
      - --accesslog
      # Enable the Traefik log, for configurations and errors
      - --log
      # Enable debug logging for local development
      - --log.level=DEBUG
      # Enable the Dashboard and API
      - --api
      # Enable the Dashboard and API in insecure mode for local development
      - --api.insecure=true
    labels:
      # Enable Traefik for this service, to make it available in the public network
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      # Dummy https-redirect middleware that doesn't really redirect, only to
      # allow running it locally
      - traefik.http.middlewares.https-redirect.contenttype.autodetect=false
    networks:
      - traefik-public
      - default
  # Overrides to run the scheduler for ZTF in dev mode with cargo-watch, which
  # automatically rebuilds and restarts the container when source files change.
  scheduler-ztf:
    env_file:
      - .env
    environment:
      BOOM_KAFKA__PRODUCER__SERVER: broker:29092
    profiles:
      - dev
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    working_dir: /app
    command:
      - cargo
      - watch
      - --watch
      - src
      - --watch
      - apache-avro-macros
      - --watch
      - Cargo.toml
      - --watch
      - Cargo.lock
      - --ignore
      - target
      - -x
      - run --bin scheduler -- ztf --config /app/config.yaml
    volumes:
      - ./src:/app/src
      - ./apache-avro-macros:/app/apache-avro-macros
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/app/target
      - ${PWD}/config.yaml:/app/config.yaml
      - ${PWD}/data/models:/app/data/models:ro
      - ${PWD}/data/ls_footprint_moc.fits:/app/data/ls_footprint_moc.fits:ro
  scheduler-lsst:
    env_file:
      - .env
  mongo:
    env_file:
      - .env
    ports:
      - "27017:27017"
  valkey:
    ports:
      - "6379:6379"
  broker:
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      # Limit heap + use G1GC with fewer threads (auto-tuned based on heap size)
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms512M -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
      # Increase timeouts for slower CI environments
      KAFKA_SOCKET_CONNECTION_SETUP_TIMEOUT_MS: 30000
      KAFKA_SOCKET_CONNECTION_SETUP_TIMEOUT_MAX_MS: 60000
  # Overrides to run the API in dev mode with cargo-watch, which automatically
  # rebuilds and restarts the container when source files change.
  api:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    working_dir: /app
    command:
      - cargo
      - watch
      - --watch
      - src
      - --watch
      - apache-avro-macros
      - --watch
      - Cargo.toml
      - --watch
      - Cargo.lock
      - --ignore
      - target
      - -x
      - run --bin api
    volumes:
      - ./src:/app/src
      - ./apache-avro-macros:/app/apache-avro-macros
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/app/target
      - ${BOOM_CONFIG_PATH:-./config.yaml}:/app/config.yaml
    ports:
      - "4000:4000"
  # Run consumer in dev mode with cargo-watch, which automatically rebuilds and
  # restarts the container when source files change.
  consumer-ztf:
    env_file:
      - .env
    environment:
      BOOM_KAFKA__CONSUMER__ZTF__SERVER: broker:29092
    profiles:
      - dev
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    working_dir: /app
    command:
      - cargo
      - watch
      - --watch
      - src
      - --watch
      - apache-avro-macros
      - --watch
      - Cargo.toml
      - --watch
      - Cargo.lock
      - --ignore
      - target
      - -x
      - run --bin kafka_consumer -- ztf 20240617 --programids public --config /app/config.yaml
    volumes:
      - ./src:/app/src
      - ./apache-avro-macros:/app/apache-avro-macros
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/app/target
      - ${PWD}/config.yaml:/app/config.yaml
  otel-collector:
    ports:
      - "4317:4317"   # OTLP gRPC receiver (from Rust OTLP exporter)
      - "55679:55679" # zpages extension
      - "13133:13133" # health_check extension
  prometheus:
    ports:
      - "9090:9090"
  loki:
    ports:
      - "3100:3100"
  tempo:
    ports:
      - "3200:3200"
  node-exporter:
    ports:
      - "9100:9100"
  kafka-exporter:
    ports:
      - "9308:9308"
  grafana:
    environment:
      # Enable dashboard editing in dev mode
      GRAFANA_DASHBOARD_EDITABLE: "true"
    ports:
      - "3000:3000"
    volumes:
      # Override to make provisioning directory writable so the dashboard provisioning script can configure it
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./scripts/grafana-dashboard-provisioning.sh:/scripts/grafana-dashboard-provisioning.sh:ro

networks:
  traefik-public:
    # For local dev, don't expect an external Traefik network
    external: false

volumes:
  cargo-registry:
  cargo-git:
  target:
